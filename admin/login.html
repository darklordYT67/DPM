<!DOCTYPE html>
<html>
<head>
    <title>DPM Admin Login</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            color: #9b59ff;
        }

        input {
            width: 250px;
            padding: 12px;
            margin: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            background-color: #7b2cff;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: #9b59ff;
        }
    </style>
</head>
<body>

<h1>👑 DPM Admin Login</h1>

<input type="text" id="username" placeholder="Username">
<br>

<input type="password" id="password" placeholder="Password">
<br>

<button onclick="login()">Login</button>

<script>
function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (username === "kevin" && password === "DPMOwner123") {
        window.location.href = "dashboard.html";
    } else {
        alert("Incorrect username or password.");
    }
}
</script>

</body>
</html>
