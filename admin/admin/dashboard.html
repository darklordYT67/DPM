<!DOCTYPE html>
<html>
<head>
    <title>DPM Admin Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: #9b59ff;
        }

        .card {
            background-color: #1e1e1e;
            border: 1px solid #7b2cff;
            border-radius: 15px;
            width: 300px;
            margin: 20px auto;
            padding: 20px;
        }

        button {
            background-color: #7b2cff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #9b59ff;
        }
    </style>
</head>
<body>

<h1>👑 DPM Owner Dashboard</h1>

<div class="card">
    <h2>📧 Owner Email</h2>
    <p>kevin@darkprovidermail.com</p>
</div>

<div class="card">
    <h2>📊 Statistics</h2>
    <p>Total Users: 0</p>
    <p>Total Messages: 0</p>
</div>

<div class="card">
    <h2>⚙️ Settings</h2>
    <button>Manage Site</button>
</div>

<div class="card">
    <h2>💎 Premium</h2>
    <p>Coming Soon</p>
</div>

</body>
</html>
